name: React CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 push될 때만 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 빌드는 GitHub 제공 서버에서 수행
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4 # 내 소스 코드를 빌드 서버로 가져옴

    - name: Docker Hub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: . # 현재 리포지토리 루트를 기준으로 하겠다는 뜻
        file: ./Dockerfile # Dockerfile 위치
        push: true
        # 이미지 태그를 'latest' 대신 커밋 해시(${{ github.sha }})로 붙여 고유하게 관리합니다.
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/rms-frontend:${{ github.sha }}

    # 실무 핵심: kube 배포 파일의 이미지 주소를 새 버전으로 수정하고 다시 커밋함
    - name: Update kube Image Tag
      run: |
        sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/rms-frontend:${{ github.sha }}|g" kube/deployment.yml
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add kube/deployment.yml
        git commit -m "Update React App to ${{ github.sha }}"
        git push